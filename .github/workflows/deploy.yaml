name: CI/CD Pipeline to AWS EC2

# This block tells GitHub to run this workflow every time code is pushed to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Deploy to the EC2 instance using SCP (Secure Copy Protocol)
      - name: Deploy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "." # Copies everything in the repository
          target: "/var/www/html/" # The Nginx web directory
          strip_components: 0

      # Step 3: Restart Nginx to ensure changes take effect (Optional but good practice)
      - name: Restart Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart nginx
