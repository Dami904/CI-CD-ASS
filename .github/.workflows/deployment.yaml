name: deploy to github pages

on:
  push:
    branches:
     - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup pages
        uses: actions/configure-pages@v4

      - name: upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./

      - name: deploy to Github Pages
        uses: actions/deploy-pages@v4